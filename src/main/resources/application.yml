server:
  port: 8091

topic-ai:
  # Base URL of the ms-cxfi-eligibility-engine service exposing /topic-ai
  base-url: https://api-na1.dev.niceincontact.com
  send-transcript-path: /feedback-intelligence/transcripts/topic-ai
  result-path: /feedback-intelligence/transcripts/{correlationId}/topic-ai
  # Token is loaded from AWS Secrets Manager (spakathon/fi, key TOKEN) — see TokenProvider
  # Poll every 5 s, give up after 2 min
  result-poll-interval-ms: 5000
  result-poll-timeout-ms: 120000

logging:
  level:
    com.nice.saas.cxfi.sparkathon: INFO
